<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript notes — site map</title>
  <link rel="stylesheet" href="site-explorer/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" defer></script>
  <script src="site-explorer/app.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#preview-panel">Skip to content</a>
  <header class="site-header">
    <h1>JavaScript notes</h1>
    <p class="tagline">Browse folders, open HTML lessons, preview Markdown and JS.</p>
  </header>
  <div class="layout">
    <nav class="nav-panel" id="nav-panel" aria-label="Repository tree">
      <div class="nav-toolbar">
        <button type="button" class="toggle-tree" id="toggle-tree" aria-expanded="true" aria-controls="tree-root">
          <span class="toggle-label">Folders</span>
        </button>
      </div>
      <div class="tree-wrap" id="tree-wrap">
        <div id="tree-root" class="tree-root"></div>
        <p id="tree-error" class="tree-error" hidden></p>
      </div>
    </nav>
    <main class="main-panel" id="preview-panel">
      <div class="preview-toolbar">
        <h2 id="preview-title" class="preview-title">Select a file</h2>
        <div class="preview-actions" id="preview-actions" hidden>
          <a id="open-tab" class="btn" href="#" target="_blank" rel="noopener noreferrer">Open in new tab</a>
        </div>
      </div>
      <div id="preview-body" class="preview-body">
        <p class="placeholder">Choose a <code>.md</code> or <code>.js</code> file in the tree, or open an <code>.html</code> lesson.</p>
      </div>
    </main>
  </div>
  <footer class="site-footer">
    <small>Update the listing after adding folders: <code>node scripts/generate-manifest.mjs</code></small>
  </footer>
</body>
</html>
